services:

  postgres:
    image: postgres:17
    container_name: restaurantes_db

    environment:
      POSTGRES_DB: restaurantes_clean_arch
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:

    build: .

    container_name: restaurantes_app

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/restaurantes_clean_arch
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123

    ports:
      - "8080:8080"

volumes:
  postgres_data: